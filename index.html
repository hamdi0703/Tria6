    <style>
      body { font-family: 'Poppins', sans-serif; }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      /* --- GAME HUB GLOBAL STYLES --- */
      .film-strip-border {
        background-image: radial-gradient(circle, rgba(255,255,255,0.1) 25%, transparent 26%);
        background-size: 20px 30px;
        background-position: 0 0;
        width: 24px;
      }
      .lens-overlay {
        background: linear-gradient(to bottom, 
          rgba(0,0,0,0.8) 0%, 
          rgba(0,0,0,0.2) 30%, 
          rgba(255,255,255,0.05) 45%, 
          rgba(255,255,255,0.05) 55%, 
          rgba(0,0,0,0.2) 70%, 
          rgba(0,0,0,0.8) 100%
        );
        border-top: 1px solid rgba(255,255,255,0.1);
        border-bottom: 1px solid rgba(255,255,255,0.1);
        box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
        backdrop-filter: blur(1px);
      }
      @keyframes flicker {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.8; }
      }
      .animate-flicker { animation: flicker 2s infinite; }
      .roulette-track {
        will-change: transform;
        transition-timing-function: cubic-bezier(0.1, 0, 0.1, 1); 
      }
      .blur-motion { filter: blur(2px) scale(0.98); }
      .no-blur {
        filter: blur(0) scale(1);
        transition: filter 0.5s ease-out, transform 0.5s ease-out;
      }
      .neon-line { box-shadow: 0 0 10px #facc15, 0 0 20px #facc15; }

      @keyframes scanline {
        0% { transform: translateY(-100%); }
        100% { transform: translateY(100%); }
      }
      .animate-scanline { animation: scanline 2s linear infinite; }
      
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
        20%, 40%, 60%, 80% { transform: translateX(4px); }
      }
      .animate-shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
      
      .scanline::after {
        content: " ";
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        right: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
        background-size: 100% 4px;
        z-index: 10;
        pointer-events: none;
      }
      
      .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 4px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(255,255,255,0.1); border-radius: 3px; }
      
      input[type=range] {
        -webkit-appearance: none;
        width: 100%;
        background: transparent;
      }
      input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none;
        height: 28px;
        width: 28px;
        border-radius: 50%;
        background: #ffffff;
        cursor: pointer;
        margin-top: -12px;
        box-shadow: 0 0 15px rgba(255,255,255,0.5);
      }
      input[type=range]::-webkit-slider-runnable-track {
        width: 100%;
        height: 4px;
        cursor: pointer;
        background: rgba(255,255,255,0.2);
        border-radius: 2px;
      }
    </style>
